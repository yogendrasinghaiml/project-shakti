name: project-shakti-app

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: shakti-postgres
    environment:
      POSTGRES_DB: shakti
      POSTGRES_USER: shakti
      POSTGRES_PASSWORD: shakti
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shakti -d shakti"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  api:
    build:
      context: .
    container_name: shakti-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_DSN: postgresql://shakti:shakti@postgres:5432/shakti
      AUTH_SHARED_SECRET_PRIMARY: ${AUTH_SHARED_SECRET_PRIMARY:-dev-insecure-secret-change-me}
      MQTT_ENABLED: "false"
      MQTT_REQUIRE_AUTH: "false"
      MQTT_REQUIRE_TLS: "false"
      SHAKTI_DB_MIGRATION_MODE: "auto"
      SHAKTI_DB_WAIT_TIMEOUT_SECONDS: "90"
    ports:
      - "8000:8000"
    restart: unless-stopped
