{{- if and .Values.secretMounts.db.create (not .Values.secretMounts.db.existingSecret) }}
{{- $dsn := .Values.secretMounts.db.dsn | trim -}}
{{- if and (eq $dsn "") .Values.postgres.enabled -}}
{{- $dsn = include "shakti.computedDbDsn" . -}}
{{- end -}}
{{- if eq $dsn "" -}}
{{- fail "secretMounts.db.dsn must be set when postgres.enabled=false and secretMounts.db.create=true" -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "shakti.dbSecretName" . }}
  labels:
    {{- include "shakti.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secretMounts.db.key }}: {{ $dsn | quote }}
{{- end }}
