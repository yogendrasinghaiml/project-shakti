{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "shakti.postgresServiceName" . }}
  labels:
    {{- include "shakti.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
      protocol: TCP
  selector:
    {{- include "shakti.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
{{- end }}
