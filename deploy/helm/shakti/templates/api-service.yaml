apiVersion: v1
kind: Service
metadata:
  name: {{ include "shakti.fullname" . }}
  labels:
    {{- include "shakti.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "shakti.selectorLabels" . | nindent 4 }}
