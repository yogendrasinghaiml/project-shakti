global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: shakti-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: shakti-postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
