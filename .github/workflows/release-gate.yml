# This workflow/job name pair is the protected branch required check context.
# If either name changes, update branch protection to match.
name: release-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: shakti
          POSTGRES_USER: shakti
          POSTGRES_PASSWORD: shakti
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U shakti -d shakti"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    env:
      SHAKTI_TEST_PG_DSN: postgresql://shakti:shakti@127.0.0.1:55432/shakti

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Enforce required check naming contract
        run: |
          set -euo pipefail
          grep -Eq '^name:[[:space:]]*release-gate[[:space:]]*$' .github/workflows/release-gate.yml
          grep -Eq '^[[:space:]]{2}release-gate:[[:space:]]*$' .github/workflows/release-gate.yml

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Frontend dependency audit
        run: npm run audit:frontend

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-ci.txt

      - name: Ops script syntax check
        run: |
          bash -n ops/db/backup_postgres.sh
          bash -n ops/db/restore_postgres.sh
          bash -n ops/docker-entrypoint.sh
          python -m py_compile ops/loadtest/run_phase4_load.py
          python -m py_compile ops/smoke/frontend_path_smoke.py

      - name: Secret hygiene scan
        run: |
          python - <<'PY'
          import pathlib
          import re
          import subprocess
          import sys

          patterns = [
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"ASIA[0-9A-Z]{16}"),
              re.compile(r"ghp_[A-Za-z0-9]{36,}"),
              re.compile(r"github_pat_[A-Za-z0-9_]{20,}"),
              re.compile(r"xox[baprs]-[A-Za-z0-9-]{10,}"),
              re.compile(r"-----BEGIN (RSA|EC|OPENSSH|DSA|PGP|PRIVATE) KEY-----"),
              re.compile(r"AIza[0-9A-Za-z\\-_]{35}"),
              re.compile(r"sk_live_[0-9a-zA-Z]{10,}"),
          ]
          ignore_prefixes = (".venv/", "node_modules/", "frontend/node_modules/")
          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          hits = []

          for rel in files:
              if rel.startswith(ignore_prefixes):
                  continue
              path = pathlib.Path(rel)
              if not path.is_file():
                  continue
              text = path.read_text(encoding="utf-8", errors="ignore")
              for rx in patterns:
                  if rx.search(text):
                      hits.append((rel, rx.pattern))
                      break

          if hits:
              print("Potential secret patterns detected:")
              for rel, pattern in hits:
                  print(f"- {rel}: {pattern}")
              sys.exit(1)

          print("Secret hygiene scan passed.")
          PY

      - name: Backend lint
        run: python -m ruff check backend

      - name: Backend type check
        run: python -m mypy --config-file backend/mypy.ini

      - name: Frontend type check
        run: npm run typecheck:frontend

      - name: Frontend build
        run: npm run build:frontend

      - name: Mission Control bundle check
        run: npm run check:mission-control

      - name: Wait for PostgreSQL
        run: |
          for i in {1..40}; do
            pg_isready -h 127.0.0.1 -p 55432 -U shakti -d shakti && exit 0
            sleep 2
          done
          echo "PostgreSQL service was not ready in time." >&2
          exit 1

      - name: Migration flow smoke check
        run: |
          python ops/db/migrate.py --dsn "$SHAKTI_TEST_PG_DSN" down --to 0
          python ops/db/migrate.py --dsn "$SHAKTI_TEST_PG_DSN" up
          python ops/db/migrate.py --dsn "$SHAKTI_TEST_PG_DSN" drift-check --require-up-to-date
          python ops/db/migrate.py --dsn "$SHAKTI_TEST_PG_DSN" down --steps 1
          python ops/db/migrate.py --dsn "$SHAKTI_TEST_PG_DSN" up

      - name: Repo default test suite
        run: npm test

      - name: Backend coverage gate
        run: python -m pytest backend/tests/test_intelligence_fusion_service.py -q --cov=backend --cov-report=term-missing --cov-fail-under=70

      - name: Backend live integration suite
        run: npm run test:backend:integration

      - name: Phase-4 load smoke gate
        run: |
          AUTH_SHARED_SECRET_PRIMARY=phase4-load-secret \
          PG_DSN="$SHAKTI_TEST_PG_DSN" \
          MQTT_ENABLED=false \
          API_RATE_LIMIT_ENABLED=false \
          .venv/bin/python -m uvicorn backend.intelligence_fusion_service:app --host 127.0.0.1 --port 18080 --no-access-log &
          api_pid=$!
          trap "kill $api_pid" EXIT
          ready=0
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:18080/healthz >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "API did not become ready in time for load smoke gate." >&2
            exit 1
          fi
          .venv/bin/python ops/smoke/frontend_path_smoke.py \
            --base-url http://127.0.0.1:18080 \
            --shared-secret phase4-load-secret
          .venv/bin/python ops/loadtest/run_phase4_load.py \
            --base-url http://127.0.0.1:18080 \
            --shared-secret phase4-load-secret \
            --requests 80 \
            --concurrency 8 \
            --max-p95-ms 1200 \
            --max-p99-ms 2000 \
            --max-error-rate-pct 5 \
            --min-success-rate-pct 95 \
            --out /tmp/shakti_phase4_load_ci.json

      - name: Staging compose render validation
        run: docker compose --env-file ops/staging/staging.env.example -f docker-compose.yml -f docker-compose.staging.yml config > /tmp/project-shakti-staging.compose.yaml

      - name: Helm chart render validation
        run: |
          docker run --rm -v "$PWD":/work -w /work alpine/helm:3.16.2 lint deploy/helm/shakti
          docker run --rm -v "$PWD":/work -w /work alpine/helm:3.16.2 template shakti deploy/helm/shakti > /tmp/project-shakti-helm.base.yaml
          docker run --rm -v "$PWD":/work -w /work alpine/helm:3.16.2 template shakti-staging deploy/helm/shakti -f deploy/helm/shakti/values-staging.yaml > /tmp/project-shakti-helm.staging.yaml
          docker run --rm -v "$PWD":/work -w /work alpine/helm:3.16.2 template shakti-prod deploy/helm/shakti -f deploy/helm/shakti/values-production.yaml > /tmp/project-shakti-helm.production.yaml

      - name: Prometheus alert rules validation
        run: docker run --rm -i --entrypoint sh prom/prometheus:v2.54.1 -c 'cat > /tmp/alerts.yml && promtool check rules /tmp/alerts.yml' < ops/staging/prometheus/alerts.yml

      - name: Container build
        run: docker build -t project-shakti-api .
